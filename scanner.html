<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BMW GIIAS — Scanner Petugas</title>
<!-- ZXing library untuk scan QR via browser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/index.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#1a1a1a;--white:#fff;--bg:#f5f4f0;--surface:#fff;
  --border:#e5e3dc;--muted:#888780;--radius:12px;--radius-sm:8px;
  --green-bg:#EAF3DE;--green-tx:#27500A;--green-bd:#C0DD97;
  --amber-bg:#FAEEDA;--amber-tx:#633806;--amber-bd:#FAC775;
  --red-bg:#FCEBEB;--red-tx:#791F1F;--red-bd:#F7C1C1;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--black);color:var(--white);min-height:100vh;
  display:flex;flex-direction:column;}

/* ── Header ── */
.header{
  background:var(--black);padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.header-brand{font-size:14px;font-weight:700;letter-spacing:.06em}
.header-brand span{opacity:.4;margin:0 6px}
.petugas-badge{
  font-size:12px;color:rgba(255,255,255,.6);
  background:rgba(255,255,255,.08);padding:5px 12px;
  border-radius:999px;cursor:pointer;border:1px solid rgba(255,255,255,.15);
}

/* ── Camera area ── */
.camera-wrap{
  flex:1;position:relative;background:#000;
  display:flex;align-items:center;justify-content:center;
  min-height:300px;
}
#video{width:100%;height:100%;object-fit:cover;display:block}
.scan-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.scan-frame{
  width:220px;height:220px;position:relative;
}
.scan-frame::before,.scan-frame::after{
  content:"";position:absolute;width:40px;height:40px;border-color:#fff;border-style:solid;
}
.scan-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-frame::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-corner-tr{position:absolute;top:0;right:0;width:40px;height:40px;
  border-top:3px solid #fff;border-right:3px solid #fff;border-radius:0 4px 0 0}
.scan-corner-bl{position:absolute;bottom:0;left:0;width:40px;height:40px;
  border-bottom:3px solid #fff;border-left:3px solid #fff;border-radius:0 0 0 4px}
.scan-line{
  position:absolute;left:8px;right:8px;height:2px;
  background:linear-gradient(90deg,transparent,#4ade80,transparent);
  animation:scanline 2s ease-in-out infinite;top:50%;
}
@keyframes scanline{0%,100%{top:15%}50%{top:85%}}

.camera-hint{
  position:absolute;bottom:16px;left:0;right:0;text-align:center;
  font-size:12px;color:rgba(255,255,255,.6);
}

/* ── Scanning indicator ── */
.scan-status{
  position:absolute;top:16px;left:0;right:0;
  display:flex;justify-content:center;
}
.scan-indicator{
  font-size:12px;font-weight:600;padding:6px 16px;border-radius:999px;
  background:rgba(0,0,0,.6);color:rgba(255,255,255,.8);
  border:1px solid rgba(255,255,255,.2);
}
.scan-indicator.scanning{color:#4ade80;border-color:#4ade80}
.scan-indicator.processing{color:#facc15;border-color:#facc15}

/* ── Result panel (slide up from bottom) ── */
.result-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  transform:translateY(100%);transition:transform .3s ease;
}
.result-panel.show{transform:translateY(0)}
.result-card{
  background:var(--surface);border-radius:20px 20px 0 0;
  padding:20px;color:var(--black);
}
.result-drag{
  width:40px;height:4px;background:var(--border);
  border-radius:999px;margin:0 auto 16px;
}
.result-icon{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;font-size:26px;
}
.icon-ok   {background:var(--green-bg);}
.icon-warn {background:var(--amber-bg);}
.icon-err  {background:var(--red-bg);}
.result-name{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.result-sub {font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:12px}
.result-status{
  display:inline-block;padding:6px 20px;border-radius:999px;
  font-size:13px;font-weight:700;margin:0 auto 16px;display:block;width:fit-content;
}
.st-ok   {background:var(--green-bg);color:var(--green-tx);border:1px solid var(--green-bd)}
.st-late {background:var(--amber-bg);color:var(--amber-tx);border:1px solid var(--amber-bd)}
.st-err  {background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red-bd)}
.result-msg{
  font-size:13px;text-align:center;padding:10px 14px;border-radius:var(--radius-sm);
  margin-bottom:14px;
}
.msg-warn{background:var(--amber-bg);color:var(--amber-tx)}
.msg-err {background:var(--red-bg);color:var(--red-tx)}
.btn-scan-next{
  width:100%;padding:14px;font-size:15px;font-weight:700;
  background:var(--black);color:var(--white);border:none;
  border-radius:var(--radius);cursor:pointer;
}

/* ── Bottom bar ── */
.bottom-bar{
  background:var(--black);padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid rgba(255,255,255,.1);
}
.scan-count{font-size:13px;color:rgba(255,255,255,.6)}
.scan-count strong{color:var(--white)}
.btn-flip{
  font-size:12px;padding:7px 14px;border-radius:999px;
  border:1px solid rgba(255,255,255,.2);background:transparent;
  color:rgba(255,255,255,.7);cursor:pointer;
}

/* ── Petugas modal ── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);border-radius:16px;padding:28px 24px;
  width:320px;max-width:90vw;color:var(--black);text-align:center;
}
.modal-title{font-size:16px;font-weight:700;margin-bottom:6px}
.modal-sub  {font-size:13px;color:var(--muted);margin-bottom:20px}
.petugas-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.petugas-opt{
  padding:12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:14px;font-weight:500;cursor:pointer;background:var(--bg);
  transition:all .15s;text-align:left;
}
.petugas-opt:hover{border-color:var(--black)}
.petugas-opt.selected{border-color:var(--black);background:var(--black);color:var(--white)}
.modal-input{
  width:100%;padding:12px;font-size:14px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);background:var(--bg);color:var(--black);
  outline:none;margin-bottom:12px;
}
.modal-input:focus{border-color:var(--black)}
.btn-modal-confirm{
  width:100%;padding:12px;font-size:14px;font-weight:700;
  background:var(--black);color:var(--white);border:none;
  border-radius:var(--radius-sm);cursor:pointer;
}

/* ── Kamera tidak tersedia ── */
.no-camera{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:12px;color:rgba(255,255,255,.6);text-align:center;padding:32px;
}
.no-camera .icon{font-size:48px}
.no-camera p{font-size:14px;line-height:1.6}
</style>
</head>
<body>

<!-- ── CONFIG — isi GAS_URL setelah deploy Apps Script ── -->
<script>
const GAS_URL = "GANTI_DENGAN_WEB_APP_URL_DARI_GOOGLE_APPS_SCRIPT";
</script>

<!-- ════ PETUGAS MODAL ════ -->
<div class="modal-overlay open" id="modal-petugas">
  <div class="modal">
    <div class="modal-title">Pilih Identitas Petugas</div>
    <div class="modal-sub">Siapa yang akan melakukan scan hari ini?</div>
    <div class="petugas-options">
      <button class="petugas-opt" onclick="selectPetugas('Petugas 1',this)">👤 Petugas 1</button>
      <button class="petugas-opt" onclick="selectPetugas('Petugas 2',this)">👤 Petugas 2</button>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:8px">atau ketik nama sendiri:</p>
    <input class="modal-input" id="input-petugas" type="text" placeholder="Nama petugas..." maxlength="30" />
    <button class="btn-modal-confirm" onclick="confirmPetugas()">Mulai Scan →</button>
  </div>
</div>

<!-- ════ HEADER ════ -->
<div class="header">
  <div class="header-brand">BMW<span>|</span>GIIAS Scanner</div>
  <div class="petugas-badge" id="petugas-badge" onclick="openPetugasModal()">
    👤 <span id="petugas-name">—</span>
  </div>
</div>

<!-- ════ CAMERA ════ -->
<div class="camera-wrap" id="camera-wrap">
  <video id="video" playsinline autoplay muted></video>

  <div class="scan-overlay">
    <div class="scan-frame">
      <div class="scan-corner-tr"></div>
      <div class="scan-corner-bl"></div>
      <div class="scan-line"></div>
    </div>
  </div>

  <div class="scan-status">
    <div class="scan-indicator scanning" id="scan-indicator">● Siap scan</div>
  </div>

  <div class="camera-hint">Arahkan kamera ke QR code ID card sales</div>
</div>

<!-- ════ RESULT PANEL ════ -->
<div class="result-panel" id="result-panel">
  <div class="result-card">
    <div class="result-drag"></div>
    <div class="result-icon" id="res-icon">✓</div>
    <div class="result-name" id="res-name">—</div>
    <div class="result-sub"  id="res-sub">—</div>
    <div class="result-status" id="res-status">—</div>
    <div id="res-msg"></div>
    <button class="btn-scan-next" onclick="resumeScan()">Scan Berikutnya</button>
  </div>
</div>

<!-- ════ BOTTOM BAR ════ -->
<div class="bottom-bar">
  <div class="scan-count">Sudah scan: <strong id="scan-count">0</strong> orang</div>
  <button class="btn-flip" onclick="flipCamera()">🔄 Ganti Kamera</button>
</div>

<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let petugas        = "";
let scanCount      = 0;
let isScanning     = false;
let isPaused       = false;
let codeReader     = null;
let currentStream  = null;
let useFrontCamera = false;
let lastScanned    = "";
let lastScannedAt  = 0;

// ══════════════════════════════════════
//  PETUGAS MODAL
// ══════════════════════════════════════
function selectPetugas(name, el) {
  document.querySelectorAll(".petugas-opt").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("input-petugas").value = name;
}

function confirmPetugas() {
  const val = document.getElementById("input-petugas").value.trim();
  if (!val) { alert("Pilih atau ketik nama petugas dulu."); return; }
  petugas = val;
  document.getElementById("petugas-name").textContent = val;
  document.getElementById("modal-petugas").classList.remove("open");
  startCamera();
}

function openPetugasModal() {
  stopCamera();
  document.getElementById("input-petugas").value = petugas;
  document.getElementById("modal-petugas").classList.add("open");
}

// ══════════════════════════════════════
//  CAMERA & SCANNER
// ══════════════════════════════════════
async function startCamera() {
  try {
    const constraints = {
      video: {
        facingMode: useFrontCamera ? "user" : { ideal: "environment" },
        width: { ideal: 1280 }, height: { ideal: 720 }
      }
    };

    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
    }

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    currentStream = stream;
    const video   = document.getElementById("video");
    video.srcObject = stream;
    await video.play();

    isScanning = true;
    isPaused   = false;
    setIndicator("scanning", "● Siap scan");
    requestAnimationFrame(scanFrame);

  } catch (err) {
    document.getElementById("camera-wrap").innerHTML =
      `<div class="no-camera">
        <div class="icon">📷</div>
        <p>Kamera tidak dapat diakses.<br>Pastikan izin kamera sudah diberikan di browser,<br>lalu refresh halaman.</p>
        <p style="font-size:12px;margin-top:8px;opacity:.6">${err.message}</p>
      </div>`;
  }
}

function stopCamera() {
  isScanning = false;
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
}

function flipCamera() {
  useFrontCamera = !useFrontCamera;
  startCamera();
}

// Scan tiap frame menggunakan ZXing
let zxingReader = null;
async function scanFrame() {
  if (!isScanning || isPaused) return;

  const video = document.getElementById("video");
  if (video.readyState !== video.HAVE_ENOUGH_DATA) {
    requestAnimationFrame(scanFrame); return;
  }

  // Lazy init ZXing reader
  if (!zxingReader) {
    zxingReader = new ZXing.BrowserQRCodeReader();
  }

  const canvas  = document.createElement("canvas");
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx     = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  try {
    const result = await zxingReader.decodeFromCanvas(canvas);
    if (result) {
      const text = result.getText();
      const now  = Date.now();
      // Debounce: scan QR yang sama tidak diproses ulang dalam 3 detik
      if (text === lastScanned && now - lastScannedAt < 3000) {
        requestAnimationFrame(scanFrame); return;
      }
      lastScanned   = text;
      lastScannedAt = now;
      onQrDetected(text);
      return;
    }
  } catch (e) {
    // Tidak ada QR terdeteksi — lanjut scan
  }

  requestAnimationFrame(scanFrame);
}

// ══════════════════════════════════════
//  QR DETECTED → PROSES CHECK-IN
// ══════════════════════════════════════
async function onQrDetected(rawText) {
  isPaused = true;
  setIndicator("processing", "⏳ Memproses...");

  // Format QR yang diharapkan: "BMWXXX" langsung, atau JSON {"id":"BMWXXX"}
  let empId = rawText.trim().toUpperCase();
  try {
    const parsed = JSON.parse(rawText);
    if (parsed.id) empId = String(parsed.id).trim().toUpperCase();
  } catch(e) {}

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ action: "scanCheckin", employeeId: empId, petugas })
    });
    const data = await res.json();
    showResult(data, empId);
  } catch (e) {
    showResult({ success: false, code: "NETWORK",
      message: "Gagal terhubung ke server. Cek koneksi internet." }, empId);
  }
}

// ══════════════════════════════════════
//  RESULT PANEL
// ══════════════════════════════════════
function showResult(data, empId) {
  const iconEl   = document.getElementById("res-icon");
  const nameEl   = document.getElementById("res-name");
  const subEl    = document.getElementById("res-sub");
  const statusEl = document.getElementById("res-status");
  const msgEl    = document.getElementById("res-msg");

  msgEl.innerHTML = "";

  if (data.success) {
    const d = data.data;
    iconEl.textContent  = "✓";
    iconEl.className    = "result-icon icon-ok";
    nameEl.textContent  = d.nama;
    subEl.textContent   = d.shift + " Shift · " + d.dealer + "\nCheck-in pukul " + d.jam + " WIB · oleh " + d.petugas;
    statusEl.textContent = d.status === "Terlambat" ? "⚠ Terlambat" : "✓ Tepat Waktu";
    statusEl.className  = "result-status " + (d.status === "Terlambat" ? "st-late" : "st-ok");
    scanCount++;
    document.getElementById("scan-count").textContent = scanCount;

  } else if (data.code === "DUPLICATE") {
    iconEl.textContent  = "⚠";
    iconEl.className    = "result-icon icon-warn";
    nameEl.textContent  = empId;
    subEl.textContent   = "";
    statusEl.textContent = "Sudah Check-In";
    statusEl.className  = "result-status st-late";
    msgEl.innerHTML     = `<div class="result-msg msg-warn">${data.message}</div>`;

  } else {
    iconEl.textContent  = "✕";
    iconEl.className    = "result-icon icon-err";
    nameEl.textContent  = empId;
    subEl.textContent   = "";
    statusEl.textContent = "Gagal";
    statusEl.className  = "result-status st-err";
    msgEl.innerHTML     = `<div class="result-msg msg-err">${data.message}</div>`;
  }

  document.getElementById("result-panel").classList.add("show");

  // Auto tutup panel setelah 4 detik jika sukses
  if (data.success) {
    setTimeout(() => resumeScan(), 4000);
  }
}

function resumeScan() {
  document.getElementById("result-panel").classList.remove("show");
  isPaused = false;
  setIndicator("scanning", "● Siap scan");
  requestAnimationFrame(scanFrame);
}

function setIndicator(cls, text) {
  const el = document.getElementById("scan-indicator");
  el.className  = "scan-indicator " + cls;
  el.textContent = text;
}
</script>
</body>
</html>
